version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/src/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend API + WebSocket ─────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BASE_RPC_URL: ${BASE_RPC_URL}
      BASE_SEPOLIA_RPC_URL: ${BASE_SEPOLIA_RPC_URL}
      RPC_WSS_URL: ${RPC_WSS_URL}
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS}
      FACTORY_ADDRESS: ${FACTORY_ADDRESS}
      VRF_COORDINATOR: ${VRF_COORDINATOR}
      VRF_SUBSCRIPTION_ID: ${VRF_SUBSCRIPTION_ID}
      VRF_KEY_HASH: ${VRF_KEY_HASH}
      PRIVATE_KEY: ${PRIVATE_KEY}
      BASESCAN_API_KEY: ${BASESCAN_API_KEY}
      PORT: "3001"

  # ── Telegram Bot ────────────────────────────────────────────────────
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3002"
    depends_on:
      - server
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      WEBAPP_URL: ${WEBAPP_URL}
      SERVER_URL: http://server:3001
      PORT: "3002"

volumes:
  pgdata:
